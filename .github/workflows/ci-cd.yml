name: CI/CD Pipeline - Qualité & Performance

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # =============================================
  # ÉTAPE 1 : Build + Tests + Couverture
  # =============================================
  build-and-test:
    name: 🔨 Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build et tests avec couverture JaCoCo
        run: mvn clean verify -B

      - name: Upload rapport JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # =============================================
  # ÉTAPE 2 : Analyse SonarQube (Quality Gate)
  # =============================================
  sonarqube-analysis:
    name: 🔍 Analyse SonarQube
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour une meilleure analyse Sonar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Analyse SonarQube + Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=stock-quality \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -B

  # =============================================
  # ÉTAPE 3 : Test de charge K6
  # =============================================
  performance-test:
    name: ⚡ Test de Charge K6
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Démarrer l'application
        run: |
          mvn spring-boot:run &
          sleep 20
          curl --retry 10 --retry-delay 3 http://localhost:8080/api/v1/risk-index?lvl=5

      - name: Installer K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Exécuter test de charge K6
        run: k6 run k6/load-test.js

      - name: Upload résultats K6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6/results/
