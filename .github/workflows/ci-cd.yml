name: CI/CD Pipeline - Qualité & Performance

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: 🔨 Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean verify -B

  sonarqube-analysis:
    name: 🔍 Analyse SonarQube
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Analyse SonarCloud via Maven
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=menuiseriembb01-boop_stock-quality-project \
            -Dsonar.organization=menuiseriembb01-boop \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -B